{% extends 'layout.html' %}
{% block css %}
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/v/bs5/jszip-2.5.0/dt-1.11.3/b-2.0.1/b-colvis-2.0.1/b-html5-2.0.1/r-2.2.9/sc-2.0.5/datatables.min.css"/>
    <link rel="stylesheet" href="{{ url_for('static',filename='css/index.css')}}">
{% endblock %}

{% block content %}
    <div class="container">
        <div class="row mb-4">
            <div class="row mt-5 mb-4 justify-content-between">
                <div class="col-md-5">
                    <canvas id="myChart" width="400" height="400"></canvas>
                </div>
                <div class="col-md-6">
                    <table class="table" style="max-width: 100%;" width="100%">
                        <thead>
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">CVE</th>
                            <th scope="col">Solution</th>
                            <th scope="col">Date</th>
                        </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</th>
                                <td>CVE-2022-23280</td>
                                <td>Microsoft Outlook</td>
                                <td>12/01/2022</td>
                            </tr>
                            <tr>
                                <td>2</th>
                                <td>CVE-2022-23274</td>
                                <td>Microsoft Dynamics</td>
                                <td>12/01/2022</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="row mt-4">
                    <table id="iocs" class="table" style="max-width: 100%;" width="100%">
                        <thead>
                            <tr>
                              <th>Item</th>
                              <th>Value</th>
                              <th>Name</th>
                              <th>Type</th>
                              <th>Reputation</th>
                              <th>Detection</th>
                            </tr>
                          </thead>
                          <tbody>
                          </tbody>
                    </table>
            </div>
        </div>
    </div>
{% endblock %}

{% block script %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.1/dist/chart.min.js"></script>
    <script type="text/javascript" src="https://cdn.datatables.net/v/bs5/jszip-2.5.0/dt-1.11.3/b-2.0.1/b-colvis-2.0.1/b-html5-2.0.1/r-2.2.9/sc-2.0.5/datatables.min.js"></script>
    
    <script>
        window.addEventListener('DOMContentLoaded', function () {
            $('#iocs').DataTable({
                dom: 'Bfrtip',
                responsive: true,
                columnDefs: [
                    { responsivePriority: 1, targets: 0 },
                    { "width": "250px", "targets": 1,render: function (data, type, full, meta) {
                            return '<p class="text-break">' + data + '</p>';    
                        }, 
                    }
                ],
                "columns": [
                    {"data": "item"},
                    {"data": "value"},
                    {"data": "name"},
                    {"data": "type"},
                    {"data": "reputation"},
                    {"data": "detection"},
                ],
                buttons: [
                    'copy', 'csv', 'excel',
                    {
                        extend: 'colvis',
                        text: 'Columnas',
                    }
                ],
                "ajax": {
                    "url": "/",
                    "type": "POST"
                },
                "language": {
                    "url": "//cdn.datatables.net/plug-ins/9dcbecd42ad/i18n/Spanish.json"
                }
            });
        })
    </script>

    <script>
        var _data;
        var _labels;
        const ctx = document.getElementById('myChart').getContext('2d');
        
        $.ajax({
            url: "/",
            type: "post",
            data: {vals: ''},
            success: function(response) {
                full_data = response;
                _data = Object.values(full_data.chartjs)
                _labels = Object.keys(full_data.chartjs)

                const myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: _labels,
                datasets: [{
                    label: '# IOC´s',
                    data: _data,
                    backgroundColor: [
                        'rgba(21, 21, 21, 1)',
                        'rgba(85, 85, 85, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(75, 192, 192, 1)',
                        'rgba(153, 102, 255, 1)',
                    ],
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
            },
        });
    </script>
{% endblock %}
